name: Frontend CI/CD Pipeline
#test
on:
  push:
    branches:
      - deploy

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Corregido: Ahora coincide con el nombre exacto de tus GitHub Secrets
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

  deploy-to-ec2:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en Instancia EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Moverse a la carpeta del proyecto en el servidor de AWS
            cd /home/ssm-user/app-innovatech || cd /home/ubuntu/app-innovatech

            # Autenticar Docker internamente usando tus credenciales heredadas de GitHub
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Descargar la versión más reciente del frontend y levantar el contenedor integrado
            sudo docker-compose pull frontend
            sudo docker-compose up -d frontend
