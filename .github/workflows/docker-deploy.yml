name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

  deploy-to-ec2:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en Instancia EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Moverse a la nueva ruta global unificada
            cd /opt/app-innovatech

            # 2. Autenticar Docker internamente
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 3. Descargar la versión más reciente del frontend y levantarla
            sudo docker compose pull frontend
            sudo docker compose up -d frontend
