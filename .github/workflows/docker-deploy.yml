name: Frontend CI/CD Pipeline
#test
on:
  push:
    branches:
      - deploy

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          file: ./front_despacho/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

  deploy-to-ec2:
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy en Instancia EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Autenticarse / Descargar la nueva imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

            # Detener el contenedor anterior si existe
            docker stop innovatech_frontend || true
            docker rm innovatech_frontend || true

            # Ejecutar el nuevo contenedor expuesto a Internet
            docker run -d \
              --name innovatech_frontend \
              -p 80:80 \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest
